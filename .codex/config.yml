role: developer
primary_goal: implement_features
quality_constraints: constitution.md

context_files:
  - spec.md
  - constitution.md
  - architectural-constraints.md
  - plan.md

commands:
  plan:
    description: "Generate technical implementation plan"
    input_files:
      - spec.md
      - constitution.md
    output_file: plan.md
    template: |
      Generate a comprehensive technical implementation plan.
      Read spec.md for requirements.
      Follow constitution.md standards.
      Output to plan.md.
  
  tasks:
    description: "Break plan into implementable tasks"
    input_files:
      - plan.md
      - spec.md
    output_directory: tasks/
    template: |
      Read plan.md and create individual task files.
      Each task should be 2-4 hours of work.
      Output to tasks/ directory.

architecture_style: serverless-aws
frameworks:
  - react
  - aws-amplify
cost_limit: $10/month
test_coverage_minimum: 80%
